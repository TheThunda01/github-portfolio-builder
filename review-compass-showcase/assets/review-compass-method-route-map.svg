<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Review Compass methods route map</title>
  <desc id="desc">A student-friendly route map showing how a research idea becomes a transparent evidence review plan.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 10 5 0 10z" fill="#31556f"/>
    </marker>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#203044" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1280" height="560" rx="24" fill="url(#paper)"/>
  <path d="M0 96h1280M0 192h1280M0 288h1280M0 384h1280M0 480h1280M160 0v560M320 0v560M480 0v560M640 0v560M800 0v560M960 0v560M1120 0v560" stroke="#dbe6ef" stroke-width="1" opacity="0.8"/>
  <text x="52" y="62" fill="#18202f" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Review Compass Methods Route Map</text>
  <text x="52" y="94" fill="#5a697c" font-family="Arial, Helvetica, sans-serif" font-size="16">Cochrane-informed planning steps for students preparing an evidence review.</text>

  <g font-family="Arial, Helvetica, sans-serif" filter="url(#softShadow)">
    <rect x="54" y="170" width="160" height="90" rx="14" fill="#ddf5ec" stroke="#0f7b68" stroke-width="2"/>
    <text x="134" y="204" text-anchor="middle" fill="#143322" font-size="16" font-weight="700">Research idea</text>
    <text x="134" y="229" text-anchor="middle" fill="#284940" font-size="13">Start with the</text>
    <text x="134" y="247" text-anchor="middle" fill="#284940" font-size="13">student topic</text>

    <rect x="258" y="170" width="168" height="90" rx="14" fill="#e2efff" stroke="#2468ad" stroke-width="2"/>
    <text x="342" y="204" text-anchor="middle" fill="#173553" font-size="16" font-weight="700">Question</text>
    <text x="342" y="229" text-anchor="middle" fill="#29445f" font-size="13">Use PICO, PCC,</text>
    <text x="342" y="247" text-anchor="middle" fill="#29445f" font-size="13">SPIDER, or CMO</text>

    <path d="M524 150 628 215 524 280 420 215z" fill="#fff2bf" stroke="#986d10" stroke-width="2"/>
    <text x="524" y="206" text-anchor="middle" fill="#3a2d00" font-size="15" font-weight="700">Review type</text>
    <text x="524" y="228" text-anchor="middle" fill="#5f4d1a" font-size="13">Match purpose</text>
    <text x="524" y="246" text-anchor="middle" fill="#5f4d1a" font-size="13">before searching</text>

    <rect x="706" y="96" width="184" height="70" rx="14" fill="#f7fbff" stroke="#2468ad" stroke-width="2"/>
    <text x="798" y="125" text-anchor="middle" fill="#173553" font-size="15" font-weight="700">Systematic review</text>
    <text x="798" y="146" text-anchor="middle" fill="#29445f" font-size="12">Focused effect question</text>

    <rect x="706" y="186" width="184" height="70" rx="14" fill="#f7fbff" stroke="#0f7b68" stroke-width="2"/>
    <text x="798" y="215" text-anchor="middle" fill="#143322" font-size="15" font-weight="700">Scoping review</text>
    <text x="798" y="236" text-anchor="middle" fill="#284940" font-size="12">Map concepts and gaps</text>

    <rect x="706" y="276" width="184" height="70" rx="14" fill="#f7fbff" stroke="#c94f4f" stroke-width="2"/>
    <text x="798" y="305" text-anchor="middle" fill="#6b2c2c" font-size="15" font-weight="700">Rapid review</text>
    <text x="798" y="326" text-anchor="middle" fill="#6b3d3d" font-size="12">Document shortcuts</text>

    <rect x="706" y="366" width="184" height="70" rx="14" fill="#f7fbff" stroke="#6d5bd0" stroke-width="2"/>
    <text x="798" y="395" text-anchor="middle" fill="#332c6c" font-size="15" font-weight="700">Evidence map</text>
    <text x="798" y="416" text-anchor="middle" fill="#4b4677" font-size="12">Chart the landscape</text>

    <rect x="984" y="90" width="220" height="60" rx="14" fill="#ffffff" stroke="#31556f" stroke-width="2"/>
    <text x="1094" y="126" text-anchor="middle" fill="#18202f" font-size="15" font-weight="700">Protocol and eligibility</text>

    <rect x="984" y="170" width="220" height="60" rx="14" fill="#ffffff" stroke="#31556f" stroke-width="2"/>
    <text x="1094" y="206" text-anchor="middle" fill="#18202f" font-size="15" font-weight="700">Search and selection</text>

    <rect x="984" y="250" width="220" height="60" rx="14" fill="#ffffff" stroke="#31556f" stroke-width="2"/>
    <text x="1094" y="286" text-anchor="middle" fill="#18202f" font-size="15" font-weight="700">Data extraction</text>

    <rect x="984" y="330" width="220" height="60" rx="14" fill="#ffffff" stroke="#31556f" stroke-width="2"/>
    <text x="1094" y="366" text-anchor="middle" fill="#18202f" font-size="15" font-weight="700">Bias and certainty</text>

    <rect x="984" y="410" width="220" height="60" rx="14" fill="#ddf5ec" stroke="#0f7b68" stroke-width="2"/>
    <text x="1094" y="446" text-anchor="middle" fill="#143322" font-size="15" font-weight="700">Transparent report</text>
  </g>

  <g fill="none" stroke="#31556f" stroke-width="3" marker-end="url(#arrow)">
    <path d="M214 215h36"/>
    <path d="M426 215h55"/>
    <path d="M613 190c40-40 56-59 92-59"/>
    <path d="M628 215h70"/>
    <path d="M613 242c42 43 56 69 92 69"/>
    <path d="M592 270c58 86 74 131 112 131"/>
    <path d="M890 131h86"/>
    <path d="M890 221h54c28 0 40-21 40-71"/>
    <path d="M890 311h48c35 0 46-37 46-81"/>
    <path d="M890 401h42c44 0 52-59 52-91"/>
    <path d="M1094 150v20"/>
    <path d="M1094 230v20"/>
    <path d="M1094 310v20"/>
    <path d="M1094 390v20"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5a697c">
    <text x="644" y="120">effect question</text>
    <text x="642" y="207">map concepts</text>
    <text x="646" y="303">time limited</text>
    <text x="612" y="398">landscape scan</text>
  </g>
</svg>